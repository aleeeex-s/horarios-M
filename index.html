<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
    display: flex;
    justify-content: center;
    align-items: center;
}

.window {
    width: 700px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    background: rgba(28,28,30,0.9);
}

.header {
    display: flex;
    align-items: center;
    padding: 10px;
    background: rgba(50,50,52,0.8);
}

.dots {
    display: flex;
    gap: 8px;
    margin-right: 10px;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.red { background: #ff5f57; }
.yellow { background: #febc2e; }
.green { background: #28c840; }

.title {
    color: #ccc;
    font-size: 14px;
}

.content {
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    color: #e5e5e7;
}

th {
    text-align: left;
    font-weight: 500;
    color: #a1a1aa;
    padding-bottom: 10px;
}

td {
    padding: 12px 8px;
    border-radius: 8px;
}

tr:hover td {
    background: rgba(255,255,255,0.05);
}

td:first-child {
    color: #71717a;
    width: 100px;
}

.badge {
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 13px;
    display: inline-block;
}

.handball { background: #ef4444; }
.clase { background: #3b82f6; }

</style>
</head>

<body>

<div class="window">

    <div class="header">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="title">Agenda</div>
    </div>

    <div class="content">
        <table>
            <tr>
                <th>Día</th>
                <th>Horario</th>
                <th>Actividad</th>
            </tr>

            <tr>
                <td>Lunes</td>
                <td>16:00 – 17:30</td>
                <td><span class="badge handball">Prácticas Handball</span></td>
            </tr>

            <tr>
                <td>Lunes</td>
                <td>20:10 – 23:00</td>
                <td><span class="badge clase">Clases Hist. de las Ideas</span></td>
            </tr>

            <tr>
                <td>Miércoles</td>
                <td>19:00 – 20:30</td>
                <td><span class="badge handball">Prácticas Handball</span></td>
            </tr>

            <tr>
                <td>Miércoles</td>
                <td>21:00 – 23:00</td>
                <td><span class="badge clase">Clases UDI</span></td>
            </tr>

            <tr>
                <td>Viernes</td>
                <td>16:00 – 17:30</td>
                <td><span class="badge handball">Prácticas Handball</span></td>
            </tr>

        </table>
    </div>

</div>

</body>
</html>
